<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Doc Writer — Bidi Agent</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --tool-bg: #1c2128;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    header h1 { font-size: 18px; font-weight: 600; }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .session-badge {
      font-size: 11px; color: var(--muted); background: var(--bg);
      padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
      cursor: pointer;
    }
    .session-badge:hover { border-color: var(--accent); color: var(--accent); }

    .btn-refresh {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 14px; padding: 3px 8px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
    }
    .status-dot.connected { background: var(--green); }
    .status-dot.connecting { background: var(--orange); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* Session picker overlay */
    .session-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .session-overlay.hidden { display: none; }

    .session-picker {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw;
      max-height: 70vh; display: flex; flex-direction: column;
    }
    .session-picker h2 { font-size: 18px; margin-bottom: 16px; }

    .session-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 16px; max-height: 300px;
    }

    .session-item {
      padding: 10px 14px; border-radius: 8px; background: var(--bg);
      border: 1px solid var(--border); cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-item:hover { border-color: var(--accent); }
    .session-item .label { font-size: 14px; font-weight: 500; }
    .session-item .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .session-empty {
      color: var(--muted); font-size: 13px; text-align: center; padding: 20px;
    }

    .btn-new-session {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-new-session:hover { opacity: 0.85; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .messages { flex: 1; overflow-y: auto; padding: 16px 24px; }

    .msg {
      margin-bottom: 12px; max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .msg.user { margin-left: auto; }
    .msg.assistant { margin-right: auto; }

    .msg-label {
      font-size: 11px; color: var(--muted);
      margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .msg-body {
      padding: 10px 14px; border-radius: 12px;
      font-size: 14px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }

    .msg.user .msg-body { background: #1f6feb; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-body {
      background: var(--surface); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.system .msg-body {
      background: transparent; color: var(--muted);
      font-size: 12px; text-align: center; padding: 4px;
    }

    /* Tool call cards */
    .tool-card {
      margin-bottom: 12px; border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; animation: fadeIn 0.2s ease;
    }
    .tool-header {
      padding: 8px 12px; background: var(--tool-bg);
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; cursor: pointer;
    }
    .tool-header .icon { font-size: 16px; }
    .tool-header .name { font-weight: 600; color: var(--accent); }
    .tool-header .status-badge {
      margin-left: auto; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge.running { background: rgba(210,153,34,0.2); color: var(--orange); }
    .status-badge.success { background: rgba(63,185,80,0.2); color: var(--green); }
    .status-badge.error   { background: rgba(248,81,73,0.2); color: var(--red); }

    .tool-details {
      display: none; padding: 8px 12px; background: var(--bg);
      font-size: 12px; font-family: 'SF Mono', Monaco, monospace;
      max-height: 300px; overflow-y: auto;
    }
    .tool-details.open { display: block; }
    .tool-details pre { white-space: pre-wrap; color: var(--muted); }

    /* Sidebar */
    .sidebar {
      width: 360px; border-left: 1px solid var(--border);
      display: flex; flex-direction: column; background: var(--surface);
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .sidebar-tab {
      flex: 1; padding: 10px 12px; background: none; border: none;
      color: var(--muted); font-size: 13px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .sidebar-tab:hover { color: var(--text); }
    .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 12px 16px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Notebook entries */
    .notebook-entries { display: flex; flex-direction: column; gap: 8px; }
    .nb-entry {
      padding: 8px 10px; border-radius: 6px; background: var(--bg);
      border: 1px solid var(--border); font-size: 13px; line-height: 1.4;
    }
    .nb-category {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; margin-bottom: 4px;
    }
    .nb-category.topic { background: rgba(88,166,255,0.15); color: var(--accent); }
    .nb-category.audience { background: rgba(63,185,80,0.15); color: var(--green); }
    .nb-category.reference { background: rgba(210,153,34,0.15); color: var(--orange); }
    .nb-category.decision { background: rgba(188,140,255,0.15); color: #bc8cff; }
    .nb-category.structure { background: rgba(88,166,255,0.15); color: var(--accent); }
    .nb-category.style { background: rgba(63,185,80,0.15); color: var(--green); }
    .nb-category.todo { background: rgba(248,81,73,0.15); color: var(--red); }
    .nb-category.note { background: rgba(139,148,158,0.15); color: var(--muted); }
    .nb-content { color: var(--text); }

    .doc-preview {
      font-size: 13px; line-height: 1.6; white-space: pre-wrap;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    }
    .no-doc {
      color: var(--muted); font-size: 13px;
      text-align: center; padding: 40px 16px;
    }

    /* Input area */
    .input-area {
      padding: 12px 24px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 8px; align-items: flex-end;
    }
    .input-area textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-size: 14px; font-family: inherit; resize: none; outline: none;
      max-height: 120px; min-height: 42px;
    }
    .input-area textarea:focus { border-color: var(--accent); }

    .input-area button {
      padding: 10px 16px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .input-area button:hover { opacity: 0.85; }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-send { background: var(--accent); color: #fff; }
    .btn-mic { background: var(--green); color: #fff; }
    .btn-mic.recording { background: var(--red); animation: pulse 0.8s infinite; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
    }

    @media (max-width: 600px) {
      header { padding: 10px 12px; }
      header h1 { font-size: 16px; }
      .messages { padding: 12px; }
      .msg { max-width: 95%; }
      .input-area { padding: 8px 12px; gap: 6px; }
      .input-area textarea {
        padding: 8px 10px; font-size: 16px; min-height: 38px;
      }
      .input-area button { padding: 8px 12px; font-size: 13px; }
      .tool-header { font-size: 12px; padding: 6px 10px; }
      .tool-details { font-size: 11px; padding: 6px 10px; }
      .tool-details pre { font-size: 11px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📝 Doc Writer</h1>
    <span class="session-badge" id="sessionBadge" onclick="showSessionPicker()" title="Switch session"></span>
    <button class="btn-refresh" id="refreshBtn" onclick="refreshAgent()" title="Refresh agent (keep notebook, clear messages)">🔄</button>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</header>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg system">
        <div class="msg-body">Select or create a session to begin.</div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="textInput" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"></textarea>
      <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
      <button class="btn-send" id="sendBtn" onclick="sendText()">Send</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="notepad" onclick="switchTab('notepad')">📝 Notepad</button>
      <button class="sidebar-tab" data-tab="document" onclick="switchTab('document')">📄 Document</button>
    </div>
    <div class="sidebar-content">
      <div class="tab-panel active" id="notepadPanel">
        <div class="no-doc" id="noNotes">No notes yet. The agent will jot down topics, references, decisions, and structure ideas as you talk.</div>
        <div class="notebook-entries" id="notebookEntries" style="display:none;"></div>
      </div>
      <div class="tab-panel" id="documentPanel">
        <div class="no-doc" id="noDoc">No document yet. When you're ready, the agent will write your document here.</div>
        <div class="doc-preview" id="docPreview" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Session Picker Overlay -->
<div class="session-overlay" id="sessionOverlay">
  <div class="session-picker">
    <h2>📂 Sessions</h2>
    <div class="session-list" id="sessionList">
      <div class="session-empty">Loading...</div>
    </div>
    <button class="btn-new-session" onclick="createNewSession()">+ New Session</button>
  </div>
</div>

<script>
  const WS_URL_BASE = `ws://${window.location.host}/ws`;
  let ws = null;
  let isRecording = false;
  let currentSessionId = null;

  // Audio contexts
  let micContext = null;
  let micStream = null;
  let micProcessor = null;
  let micSource = null;
  let playbackContext = null;
  let nextPlayTime = 0;

  // --- Session Management ---
  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      const data = await res.json();
      const list = document.getElementById('sessionList');

      if (!data.sessions.length) {
        list.innerHTML = '<div class="session-empty">No sessions yet. Create one to get started.</div>';
        return;
      }

      list.innerHTML = data.sessions.map(s => {
        const date = new Date(s.modified * 1000).toLocaleString();
        return `<div class="session-item" onclick="joinSession('${s.session_id}')">
          <div class="label">${escapeHtml(s.label)}</div>
          <div class="meta">${s.notebook_count} notes · ${date}</div>
        </div>`;
      }).join('');
    } catch (e) {
      console.error('Failed to load sessions:', e);
    }
  }

  async function createNewSession() {
    try {
      const res = await fetch('/api/sessions', { method: 'POST' });
      const data = await res.json();
      joinSession(data.session_id);
    } catch (e) {
      console.error('Failed to create session:', e);
    }
  }

  function joinSession(sessionId) {
    currentSessionId = sessionId;
    window.location.hash = sessionId;
    document.getElementById('sessionOverlay').classList.add('hidden');
    document.getElementById('sessionBadge').textContent = `session: ${sessionId}`;
    connect(sessionId);
  }

  function showSessionPicker() {
    if (ws) { ws.close(); ws = null; }
    setStatus('disconnected');
    document.getElementById('sessionOverlay').classList.remove('hidden');
    loadSessions();
  }

  // --- Connection ---
  function connect(sessionId) {
    setStatus('connecting');
    ws = new WebSocket(`${WS_URL_BASE}?session_id=${sessionId}`);

    ws.onopen = () => {
      setStatus('connected');
      addSystemMsg('Connected. Start talking or typing!');
    };

    ws.onmessage = (evt) => {
      try { handleEvent(JSON.parse(evt.data)); }
      catch (e) { console.error('Parse error:', e); }
    };

    ws.onclose = () => {
      setStatus('disconnected');
      addSystemMsg('Disconnected. Click the session badge to reconnect.');
      if (isRecording) stopMic();
    };

    ws.onerror = (e) => {
      console.error('WebSocket error:', e);
      setStatus('disconnected');
    };
  }

  // --- Event Handling ---
  let currentTranscript = null;
  let currentAssistantMsg = null;

  function handleEvent(event) {
    const type = event.type;

    switch (type) {
      case 'session_info':
        currentSessionId = event.session_id;
        document.getElementById('sessionBadge').textContent = `session: ${event.session_id}`;
        window.location.hash = event.session_id;
        break;

      case 'bidi_connection_start':
        addSystemMsg(`Connected to ${event.model || 'model'}`);
        break;

      case 'bidi_transcript_stream':
        handleTranscript(event);
        break;

      case 'bidi_audio_stream':
        handleAudio(event);
        break;

      case 'bidi_tool_start':
        addToolCard(event.tool_name, event.tool_input, 'running');
        break;

      case 'bidi_tool_complete':
        updateToolCard(event.tool_name, event.tool_output, event.status || 'success');
        if (event.tool_name === 'use_agent' && event.tool_output) {
          updateDocPreview(event.tool_output);
        }
        break;

      case 'bidi_response_start':
        currentAssistantMsg = null;
        break;

      case 'bidi_response_complete':
        currentAssistantMsg = null;
        break;

      case 'bidi_interruption':
        addSystemMsg('⚡ Interrupted');
        if (playbackContext) {
          playbackContext.close();
          playbackContext = null;
          nextPlayTime = 0;
        }
        break;

      case 'bidi_connection_restart':
        addSystemMsg('🔄 Reconnecting...');
        break;

      case 'bidi_connection_close':
        addSystemMsg(`Connection closed: ${event.reason || 'unknown'}`);
        break;

      case 'tool_use_stream':
        if (event.current_tool_use) {
          addToolCard(event.current_tool_use.name, event.current_tool_use, 'running');
        }
        break;

      case 'tool_result':
        if (event.tool_result) {
          const name = event.tool_result.name || 'tool';
          const content = event.tool_result.content?.[0]?.text || JSON.stringify(event.tool_result.content);
          updateToolCard(name, content, event.tool_result.status || 'success');
          if (name === 'use_agent') updateDocPreview(content);
        }
        break;

      case 'notebook_update':
        renderNotebook(event.entries || []);
        break;

      case 'agent_refreshed':
        document.getElementById('messages').innerHTML = '';
        addSystemMsg('🔄 Agent refreshed — notebook and files preserved, conversation cleared.');
        break;

      default:
        console.log('Event:', type, event);
    }
  }

  function handleTranscript(event) {
    const role = event.role || 'assistant';
    const text = event.text || '';
    const isFinal = event.is_final || false;

    if (role === 'user') {
      if (!currentTranscript) {
        currentTranscript = addMessage('user', text);
      } else {
        updateMessage(currentTranscript, text);
      }
      if (isFinal) currentTranscript = null;
    } else {
      if (!currentAssistantMsg) {
        currentAssistantMsg = addMessage('assistant', text);
      } else {
        updateMessage(currentAssistantMsg, text);
      }
    }
  }

  // --- Audio Playback ---
  async function handleAudio(event) {
    if (!event.audio) return;
    try {
      if (!playbackContext) {
        playbackContext = new AudioContext({ sampleRate: 16000 });
        nextPlayTime = playbackContext.currentTime;
      }
      if (playbackContext.state === 'suspended') await playbackContext.resume();

      const binary = atob(event.audio);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

      const buffer = playbackContext.createBuffer(1, float32.length, 16000);
      buffer.getChannelData(0).set(float32);

      const currentTime = playbackContext.currentTime;
      if (nextPlayTime < currentTime) nextPlayTime = currentTime;

      const source = playbackContext.createBufferSource();
      source.buffer = buffer;
      source.connect(playbackContext.destination);
      source.start(nextPlayTime);
      nextPlayTime += buffer.duration;
    } catch (e) {
      console.error('Audio playback error:', e);
    }
  }

  // --- Microphone ---
  async function toggleMic() {
    if (!isRecording) await startMic();
    else stopMic();
  }

  async function startMic() {
    const btn = document.getElementById('micBtn');
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
      });
      micContext = new AudioContext();
      micSource = micContext.createMediaStreamSource(micStream);
      micProcessor = micContext.createScriptProcessor(4096, 1, 1);

      const nativeSampleRate = micContext.sampleRate;
      const targetRate = 16000;
      const downsampleRatio = nativeSampleRate / targetRate;

      micProcessor.onaudioprocess = (e) => {
        if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
        const inputData = e.inputBuffer.getChannelData(0);
        const outputLength = Math.floor(inputData.length / downsampleRatio);
        const int16Data = new Int16Array(outputLength);
        for (let i = 0; i < outputLength; i++) {
          const srcIdx = Math.floor(i * downsampleRatio);
          int16Data[i] = Math.max(-32768, Math.min(32767, Math.round(inputData[srcIdx] * 32768)));
        }
        const bytes = new Uint8Array(int16Data.buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({
          type: 'bidi_audio_input', audio: btoa(binary),
          format: 'pcm', sample_rate: targetRate, channels: 1
        }));
      };

      micSource.connect(micProcessor);
      micProcessor.connect(micContext.destination);
      isRecording = true;
      btn.classList.add('recording');
      btn.textContent = '⏹';
      addSystemMsg('🎤 Recording — speak now');
    } catch (e) {
      console.error('Mic error:', e);
      addSystemMsg('⚠️ Microphone access denied: ' + e.message);
    }
  }

  function stopMic() {
    const btn = document.getElementById('micBtn');
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
    if (micSource) { micSource.disconnect(); micSource = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (micContext) { micContext.close(); micContext = null; }
    addSystemMsg('🎤 Recording stopped');
  }

  // --- Agent Refresh ---
  function refreshAgent() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'refresh_agent' }));
  }

  // --- Text Input ---
  function sendText() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'bidi_text_input', text: text }));
    addMessage('user', text);
    input.value = '';
    autoResize(input);
  }

  // --- UI Helpers ---
  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Agent';
    const body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = text;
    div.appendChild(label);
    div.appendChild(body);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function updateMessage(el, text) {
    if (!el) return;
    const body = el.querySelector('.msg-body');
    if (body) body.textContent = text;
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  function addSystemMsg(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg system';
    const body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = text;
    div.appendChild(body);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  let toolCards = {};
  function addToolCard(name, input, status) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'tool-card';
    const inputStr = typeof input === 'object' ? JSON.stringify(input, null, 2) : String(input || '');
    div.innerHTML = `
      <div class="tool-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="icon">🔧</span>
        <span class="name">${escapeHtml(name)}</span>
        <span class="status-badge ${status}">${status}</span>
      </div>
      <div class="tool-details"><pre>${escapeHtml('Input:\n' + inputStr)}</pre></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    toolCards[name] = div;
  }

  function updateToolCard(name, output, status) {
    const card = toolCards[name];
    if (!card) return;
    const badge = card.querySelector('.status-badge');
    if (badge) { badge.className = `status-badge ${status}`; badge.textContent = status; }
    const details = card.querySelector('.tool-details pre');
    if (details && output) {
      const outputStr = typeof output === 'object' ? JSON.stringify(output, null, 2) : String(output);
      details.textContent += '\n\nOutput:\n' + outputStr.slice(0, 5000);
    }
    delete toolCards[name];
  }

  function updateDocPreview(content) {
    const preview = document.getElementById('docPreview');
    const noDoc = document.getElementById('noDoc');
    noDoc.style.display = 'none';
    preview.style.display = 'block';
    preview.innerHTML = escapeHtml(content)
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }

  function setStatus(state) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'status-dot ' + state;
    text.textContent = state === 'connected' ? 'Connected' :
                       state === 'connecting' ? 'Connecting...' : 'Disconnected';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const textarea = document.getElementById('textInput');
  textarea.addEventListener('input', () => autoResize(textarea));
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // --- Tab Switching ---
  function switchTab(tab) {
    document.querySelectorAll('.sidebar-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.getElementById('notepadPanel').classList.toggle('active', tab === 'notepad');
    document.getElementById('documentPanel').classList.toggle('active', tab === 'document');
  }

  // --- Notebook Rendering ---
  function renderNotebook(entries) {
    const container = document.getElementById('notebookEntries');
    const noNotes = document.getElementById('noNotes');
    if (!entries.length) {
      noNotes.style.display = 'block';
      container.style.display = 'none';
      return;
    }
    noNotes.style.display = 'none';
    container.style.display = 'flex';
    container.innerHTML = entries.map(e =>
      `<div class="nb-entry">
        <div class="nb-category ${escapeHtml(e.category)}">${escapeHtml(e.category)}</div>
        <div class="nb-content">${escapeHtml(e.content)}</div>
      </div>`
    ).join('');

    const notepadTab = document.querySelector('.sidebar-tab[data-tab="notepad"]');
    if (!notepadTab.classList.contains('active')) {
      notepadTab.style.color = 'var(--green)';
      setTimeout(() => { notepadTab.style.color = ''; }, 1500);
    }
  }

  // --- Init: check URL hash for session ID ---
  (async function init() {
    const hash = window.location.hash.slice(1);
    if (hash) {
      // Resume existing session from URL
      joinSession(hash);
    } else {
      // Show session picker
      await loadSessions();
    }
  })();
</script>

</body>
</html>
